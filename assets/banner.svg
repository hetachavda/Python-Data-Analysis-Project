<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eda100"/>
      <stop offset="100%" stop-color="#1baf7a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <g stroke="#3a5a68" stroke-width="1" opacity="0.25">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- line + scatter motif: EDA trend that draws in with pop-in points -->
  <g filter="url(#glow)">
    <polyline points="820,220 865,180 910,195 955,140 1000,155 1045,110 1090,125"
      fill="none" stroke="#00c6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="360" stroke-dashoffset="360">
      <animate attributeName="stroke-dashoffset" from="360" to="0" begin="0.3s" dur="1.3s" fill="freeze"/>
    </polyline>
    <g fill="#eda100">
      <circle cx="820" cy="220" r="0"><animate attributeName="r" values="0;6" begin="0.6s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="865" cy="180" r="0"><animate attributeName="r" values="0;6" begin="0.75s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="910" cy="195" r="0"><animate attributeName="r" values="0;6" begin="0.9s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="955" cy="140" r="0"><animate attributeName="r" values="0;6" begin="1.05s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="1000" cy="155" r="0"><animate attributeName="r" values="0;6" begin="1.2s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="1045" cy="110" r="0"><animate attributeName="r" values="0;6" begin="1.35s" dur="0.4s" fill="freeze"/></circle>
      <circle cx="1090" cy="125" r="0"><animate attributeName="r" values="0;6" begin="1.5s" dur="0.4s" fill="freeze"/></circle>
    </g>
    <g fill="#1baf7a" opacity="0.85">
      <circle cx="845" cy="240" r="4"><animate attributeName="opacity" values="0.4;0.95;0.4" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="980" cy="205" r="4"><animate attributeName="opacity" values="0.4;0.95;0.4" begin="0.7s" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="1060" cy="180" r="4"><animate attributeName="opacity" values="0.4;0.95;0.4" begin="1.4s" dur="3s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <rect x="70" y="96" width="8" height="128" rx="4" fill="url(#accent)"/>
  <text x="105" y="128" font-size="44" font-weight="700" fill="#ffffff">End-to-End Python Data Analysis</text>
  <text x="105" y="172" font-size="23" font-weight="400" fill="#ffe6a8">Cleaning · EDA · Feature Engineering · Predictive Modeling</text>

  <g font-size="16" font-weight="600">
    <rect x="105" y="200" width="170" height="34" rx="17" fill="#eda100" opacity="0.9"/>
    <text x="190" y="223" fill="#0b0b0b" text-anchor="middle">R&#178; 0.75&#8211;0.80</text>
    <rect x="287" y="200" width="170" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="372" y="223" fill="#cfeefc" text-anchor="middle">~82% Accuracy</text>
    <rect x="469" y="200" width="160" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
    <text x="549" y="223" fill="#cfeefc" text-anchor="middle">3 ML Models</text>
  </g>

  <text x="105" y="285" font-size="15" fill="#7fa9bd">Python &#183; Pandas &#183; Scikit-Learn &#183; Seaborn   |   Heta Chavda &#8212; Data Analytics Portfolio</text>

  <rect x="-260" y="0" width="260" height="320" fill="url(#shine)" transform="skewX(-20)">
    <animate attributeName="x" from="-260" to="1300" dur="4.5s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
